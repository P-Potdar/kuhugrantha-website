<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | KuhuGrantha Pvt. Ltd.</title>
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #6366f1 0%, #14b8a6 100%);
      text-align: center;
      padding: 20px;
      color: #1e293b;
    }
    .thank-you-card {
      background: white;
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      max-width: 600px;
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 {
      color: #6366f1;
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    p {
      color: #64748b;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      padding: 15px 40px;
      background: linear-gradient(135deg, #6366f1, #14b8a6);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: transform 0.3s;
    }
    .btn:hover { transform: translateY(-3px); }
  </style>
</head>
<body>
  <div class="thank-you-card">
    <h1>🎉 Thank You!</h1>
    <p>Your message has been sent successfully. We'll get back to you within 24 hours at <strong>contact@kuhugrantha.com</strong>.</p>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
